<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>護理部 LINE 訊息建立器 V2.1</title>
<style>
:root{--bg:#f4f7f8;--card:#fff;--text:#1f2937;--muted:#64748b;--line:#dbe3e8;--primary:#287a67;--primary2:#e7f4ef;--danger:#b42318}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
header{background:#fff;border-bottom:1px solid var(--line);padding:15px 18px}h1{font-size:20px;margin:0}header p{margin:4px 0 0;color:var(--muted);font-size:13px}
.app{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(320px,.75fr);gap:18px;max-width:1480px;margin:auto;padding:18px}.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 5px 20px rgba(15,23,42,.04)}
h2{font-size:18px;margin:0 0 14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.full{grid-column:1/-1}label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:#fff}textarea{min-height:78px}.section{border-top:1px solid var(--line);padding-top:16px;margin-top:16px}.hidden{display:none!important}
.item,.business-card,.clinic-card{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fbfcfd}.item-head,.business-title,.clinic-title{display:flex;justify-content:space-between;align-items:center;gap:10px}.item-title,.business-title,.clinic-title{font-weight:800}.mode{display:flex;gap:10px;flex-wrap:wrap}.mode label{display:flex;align-items:center;gap:5px;margin:0;font-weight:600}.mode input{width:auto}.fields{margin-top:12px}.rows{display:flex;flex-direction:column;gap:10px}.row-card{position:relative;border:1px dashed #b8c7cf;border-radius:12px;padding:10px;background:#fff}.row-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.remove,.remove-day-row{position:absolute;right:8px;top:8px;border:0;background:#fff0f0;color:var(--danger);padding:5px 8px;border-radius:8px;cursor:pointer}.remove-business,.remove-clinic{border:1px solid #fecaca;background:#fff0f0;color:var(--danger);padding:7px 10px;border-radius:9px;cursor:pointer;font-weight:800}
.btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:800}.btn-primary{background:var(--primary);color:#fff}.btn-secondary{background:var(--primary2);color:var(--primary)}.btn-light{background:#eef2f5;color:#334155}.btn-danger{background:#fff0f0;color:var(--danger)}.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.preview-wrap{position:sticky;top:18px;height:max-content}.preview{white-space:pre-wrap;background:#111827;color:#f8fafc;border-radius:14px;padding:16px;min-height:420px;max-height:72vh;overflow:auto;line-height:1.65;font-size:14px}.status{font-size:13px;color:var(--muted);margin-top:8px}.note{font-size:12px;color:var(--muted);margin-top:6px}.type-buttons{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.type-btn{border:1px solid var(--line);background:#fff;padding:12px;border-radius:12px;cursor:pointer;font-weight:800}.type-btn.active{border-color:var(--primary);background:var(--primary2);color:var(--primary)}
.biz-pick{flex:1;min-width:0;font-weight:700}
@media(max-width:900px){.app{grid-template-columns:1fr}.grid,.row-grid,.type-buttons{grid-template-columns:1fr}.preview-wrap{position:static}.preview{min-height:260px;max-height:none}}
</style></head>
<body><header><h1>護理部 LINE 訊息建立器 V2</h1><p>多種類整合版 班別名稱僅供切換，不會出現在輸出訊息</p></header>
<main class="app"><section class="panel"><h2>選擇建立種類</h2><div id="typeButtons" class="type-buttons"></div><div id="formRoot" class="section"></div><div class="btn-row section"><button class="btn btn-light" id="loadDraft">載入草稿</button><button class="btn btn-danger" id="clearAll">清除目前表單</button></div><div id="status" class="status">編輯內容會自動保存</div></section>
<aside class="panel preview-wrap"><h2>LINE 訊息即時預覽</h2><div id="preview" class="preview"></div><div class="btn-row"><button class="btn btn-primary" id="copyBtn">📋 複製 LINE 訊息</button><button class="btn btn-light" id="copyClearBtn">複製後清除</button></div></aside></main>
<script>
const status=document.getElementById('status');
const clinics=['北葉晨心','三和晨安','龍泉晨安','繁華晨安','長治晨安','里港晨安','鹽埔晨安','安心銘燦','安心俊鴻','善化中山','善化晨安'];
const circ=['➊','➋','➌','➍','➎','➏','➐','➑','➒','➓'];
const types=[['A','A 班'],['B','B 班'],['D','D 班'],['I','I 班'],['weekly','每週電腦更新回覆'],['monthly','每月未完成採檢＋抽審病歷銷毀'],['password','預防保健密碼更新']];
let current='A';
const commonBiz={
'欠卡追蹤':'contact','外傷照片歸檔':'dateShift','方鼎報告輸入與愛半月核對':'dateOnly','預防保健通知':'contact','預防保健輸入':'twoStage','未看報告追蹤':'contact','身心科預約':'contact','身心科預約 2 撥':'contact','慢性預約回診名單':'pulledDate','慢性回診名單反黃核對':'dateShift','連處交付調劑醫師回填':'dateShift','慢性病預約回診電訪':'dateContact','慢性病預約回診電訪 2 撥':'dateContact','慢性病未回診追蹤':'dayContact','慢性病長期未回追蹤':'contact','慢性病長期未回追蹤 2 撥':'contact','眼底轉介追蹤':'contact','急性病關懷追蹤':'contact','抽血報告異常追蹤':'contact','轉診追蹤':'contact','其他項目':'other'};
const iBiz={'糖網收案':'people','共病收案':'people','CKD 收案':'people','後臺收案':'people','補收案衛教':'people','非收案衛教':'people','收案電訪':'contact','每日慢性病人數表單':'dateOnly','每日收案報表':'dateOnly','每日療程核對':'dateOnly','業務報表':'yearMonth','每月慢性電訪人數表單':'yearMonth','每月糖尿病人數':'yearMonth','糖網結案電訪':'contact','共病收案電訪':'contact','CKD 收案電訪':'contact','他院 VPN 查詢':'vpn','慢性回診名單反黃核對':'dateShift','慢性病預約回診名單':'pulledDate','慢性病預約回診電訪':'dateContact','慢性病預約回診電訪 2 撥':'dateContact','慢性病未回診追蹤':'dayContact','慢性病長期未回追蹤':'contact','慢性病長期未回追蹤 2 撥':'contact','眼底轉介追蹤':'contact','眼底轉介單繳回':'people','胰島素追蹤':'contact','胰島素衛教':'people','猛健樂衛教':'people','猛健樂首次追蹤':'linePeople','猛健樂 6 週追蹤':'linePeople','猛健樂 12 週追蹤':'linePeople','其他項目':'other'};
const handovers=[
{id:'labs',title:'未完成採檢',type:'repeat',fields:[['mrn','病歷號'],['name','姓名'],['missing','缺少項目']]},{id:'records',title:'病歷申請',type:'repeat',fields:[['mrn','病歷號'],['name','姓名'],['request','申請項目'],['progress','當前進度']]},{id:'audit',title:'抽審資料整理進度',type:'select',options:['已完成至紙本病歷尋找','已完成至病歷首頁列印','已完成至檢驗報告列印','已完成至已排序','已完成至待寄出','已寄出']},{id:'repair',title:'待修物品',type:'repeat',fields:[['location','物品位置'],['name','物品名稱'],['reason','故障原因'],['progress','當前進度']]},{id:'flu',title:'流感快篩',type:'stockRepeat'},{id:'covid',title:'COVID-19 快篩',type:'stockRepeat'},{id:'tamiflu',title:'克流感餘量',type:'stock',kind:'發放',rows:[['瑞樂沙','支'],['易剋冒','顆'],['Tamiflu','顆']]},{id:'vaccine',title:'疫苗／藥品庫存',type:'stock',kind:'庫存',rows:[['皰疹疫苗','支'],['肺鏈疫苗','支'],['B 肝疫苗','支'],['破傷風','支']]},{id:'mounjaro',title:'猛健樂（Mounjaro）',type:'stock',kind:'庫存',rows:[['2.5mg','支'],['5mg','支'],['10mg','支'],['12.5mg','支'],['15mg','支']]},{id:'special',title:'特殊交班事項',type:'repeat',fields:[['text','項目']]}];
function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function clinicOptions(){return clinics.map(x=>`<option>${x}</option>`).join('')}
function baseFields(prefix=''){return `<div class="grid"><div><label>日期</label><input type="date" data-role="date" value="${today()}"></div><div><label>院所</label><select data-role="clinic">${clinicOptions()}</select></div></div>`}
function renderTypeButtons(){typeButtons.innerHTML=types.map(([id,n])=>`<button class="type-btn ${id===current?'active':''}" data-type="${id}">${n}</button>`).join('')}
function renderForm(){renderTypeButtons(); if(current==='A')renderA(); else if(current==='B'||current==='D')renderBD(); else if(current==='I')renderI(); else if(current==='weekly')renderWeekly(); else if(current==='monthly')renderMonthly(); else renderPassword(); render()}
function renderA(){formRoot.innerHTML=`<h2>基本資料</h2>${baseFields()}<div class="section"><h2>院所交班</h2>${handovers.map(handoverCard).join('')}</div>${bizSection(commonBiz)}`}
function renderBD(){formRoot.innerHTML=`<h2>基本資料</h2>${baseFields()}${bizSection(commonBiz)}`}
function renderI(){formRoot.innerHTML=`<h2>I 班多院所交班</h2><div id="clinicList"></div><button class="btn btn-secondary" id="addClinic">＋ 新增院所</button>`;addIClinic()}
function renderWeekly(){formRoot.innerHTML=`<h2>每週電腦更新回覆</h2><div><label>院所</label><select data-role="clinic">${clinicOptions()}</select></div><div class="item"><div class="mode"><label><input type="radio" name="weeklyMode" value="none" checked>無須更新，主機已重啟</label><label><input type="radio" name="weeklyMode" value="data">有項目須更新</label></div><div id="weeklyFields" class="fields hidden"><label>須更新項目</label><input data-role="weeklyItem" placeholder="請輸入項目"></div></div>`}
function renderMonthly(){formRoot.innerHTML=`<h2>每月未完成採檢＋抽審病歷銷毀</h2><div><label>院所</label><select data-role="clinic">${clinicOptions()}</select></div><div class="section"><h2>未完成採檢</h2>${handoverCard(handovers[0],true)}</div><div class="section monthly-destroy"><h2>抽審病歷銷毀</h2><div class="mode"><label><input type="radio" name="destroyMode" value="none" checked>無</label><label><input type="radio" name="destroyMode" value="data">填寫銷毀進度</label></div><div id="destroyFields" class="hidden"><div class="row-grid"><div><label>銷毀至年份</label><input type="number" min="1900" max="2100" data-role="destroyYear" placeholder="例如 2024"></div><div><label>銷毀至月份</label><input type="number" min="1" max="12" data-role="destroyMonth" placeholder="1–12"></div></div></div></div>`}
function renderPassword(){formRoot.innerHTML=`<h2>預防保健密碼更新</h2><div class="grid"><div><label>院所</label><select data-role="clinic">${clinicOptions()}</select></div><div><label>更新密碼</label><input data-role="passwordText" placeholder="請輸入更新密碼或內容"></div></div>`}
function handoverCard(d,force=false){return `<div class="item" data-handover="${d.id}"><div class="item-head"><div class="item-title">【${d.title}】</div><div class="mode"><label><input type="radio" name="${d.id}Mode" value="none" checked>無</label><label><input type="radio" name="${d.id}Mode" value="data">填寫</label></div></div><div id="${d.id}Fields" class="fields hidden">${handoverFields(d)}</div></div>`}
function handoverFields(d){if(d.type==='repeat')return `<div id="${d.id}Rows" class="rows"></div><button class="btn btn-secondary add-row" data-id="${d.id}">＋ 新增一筆</button>`;if(d.type==='select')return `<select data-role="single">${d.options.map(x=>`<option>${x}</option>`).join('')}</select>`;if(d.type==='stockRepeat')return `<div id="${d.id}Rows" class="rows"></div><button class="btn btn-secondary add-row" data-id="${d.id}">＋ 新增項目</button>`;if(d.type==='stock')return d.rows.map((r,i)=>`<div class="row-card"><div class="row-grid"><div><label>項目</label><input value="${r[0]}" disabled></div><div><label>${d.kind}</label><input type="number" min="0" value="0" data-stock="${d.id}-${i}-a"></div><div><label>${d.kind==='庫存'?'預訂':'餘'}</label><input type="number" min="0" value="0" data-stock="${d.id}-${i}-b"></div><div><label>單位</label><input value="${r[1]}" disabled></div></div></div>`).join('')+`<div id="${d.id}Custom"></div><button class="btn btn-secondary add-custom" data-id="${d.id}">＋ 新增其他項目</button>`}
function bizSection(defs,prefix=''){return `<div class="section biz-section"><h2>個人業務</h2><div class="mode"><label><input type="radio" name="bizGlobal${prefix}" value="none">無個人業務</label><label><input type="radio" name="bizGlobal${prefix}" value="custom" checked>新增個別項目</label></div><div class="biz-controls"><div style="margin-top:12px"><button class="btn btn-secondary add-biz" data-set="${defs===iBiz?'i':'common'}">＋ 加入個人業務</button></div><div class="biz-list"></div></div></div>`}
function addIClinic(){const n=document.querySelectorAll('.clinic-card').length+1;clinicList.insertAdjacentHTML('beforeend',`<div class="clinic-card"><div class="clinic-title"><span>院所 ${n}</span><button class="remove-clinic">✕ 移除此院所</button></div>${baseFields()}${bizSection(iBiz,'I'+Date.now())}</div>`);renumberClinics();render()}
function renumberClinics(){document.querySelectorAll('.clinic-card').forEach((c,i)=>c.querySelector('.clinic-title span').textContent=`院所 ${i+1}`)}
function addRow(id,root=document){const d=handovers.find(x=>x.id===id),box=root.querySelector(`#${id}Rows`)||document.getElementById(id+'Rows');let body='';if(d.type==='repeat')body=`<div class="row-grid">${d.fields.map(f=>`<div><label>${f[1]}</label><input data-field="${f[0]}" placeholder="請輸入${f[1]}"></div>`).join('')}</div>`;else body=`<div class="row-grid"><div><label>項目</label><input data-field="item"></div><div><label>發放</label><input type="number" min="0" value="0" data-field="out"></div><div><label>餘量</label><input type="number" min="0" value="0" data-field="left"></div><div><label>單位</label><input value="支" data-field="unit"></div></div>`;box.insertAdjacentHTML('beforeend',`<div class="row-card"><button class="remove">刪除</button>${body}</div>`)}
function addCustom(id){const d=handovers.find(x=>x.id===id),box=document.getElementById(id+'Custom');box.insertAdjacentHTML('beforeend',`<div class="row-card custom-stock"><button class="remove">刪除</button><div class="row-grid"><div><label>項目</label><input data-field="item"></div><div><label>${d.kind}</label><input type="number" min="0" value="0" data-field="a"></div><div><label>${d.kind==='庫存'?'預訂':'餘'}</label><input type="number" min="0" value="0" data-field="b"></div><div><label>單位</label><input value="支" data-field="unit"></div></div></div>`)}
function bizFields(type){const contact=`<div class="row-grid">${['已接','未接','簡訊','LINE'].map(x=>`<div><label>${x}</label><input type="number" min="0" data-biz="${x}"></div>`).join('')}</div>`;if(type==='contact')return contact;if(type==='dateShift')return `<div class="row-grid"><div><label>月</label><input type="number" min="1" max="12" data-biz="month"></div><div><label>日</label><input type="number" min="1" max="31" data-biz="day"></div><div><label>診別</label><select data-biz="shift"><option>早</option><option>午</option><option>晚</option></select></div></div>`;if(type==='dateOnly'||type==='pulledDate')return `<div class="row-grid"><div><label>月</label><input type="number" min="1" max="12" data-biz="month"></div><div><label>日</label><input type="number" min="1" max="31" data-biz="day"></div></div>`;if(type==='yearMonth')return `<div class="row-grid"><div><label>年</label><input type="number" data-biz="year"></div><div><label>月</label><input type="number" min="1" max="12" data-biz="month"></div></div>`;if(type==='twoStage')return `<div class="row-grid"><div><label>一階輸入</label><input data-biz="stage1"></div><div><label>二接輸入</label><input data-biz="stage2"></div></div>`;if(type==='people')return `<label>人數</label><input type="number" min="0" data-biz="people">`;if(type==='linePeople')return `<label>LINE 人數</label><input type="number" min="0" data-biz="people">`;if(type==='vpn')return `<label>已完成項目（可複選）</label><div class="mode">${['糖網','CKD','共病'].map(x=>`<label><input type="checkbox" data-biz="vpn" value="${x}">${x}</label>`).join('')}</div>`;if(type==='dateContact')return `<div class="mode"><label><input class="date-contact-mode" type="radio" value="none">無</label><label><input class="date-contact-mode" type="radio" value="data" checked>填寫</label></div><div class="date-contact-fields"><div class="date-contact-rows"></div><button class="btn btn-secondary add-date-contact">＋ 新增追蹤日期</button><div class="note date-contact-warning"></div></div>`;if(type==='dayContact')return `<div class="mode"><label><input class="day-mode" type="radio" value="none">無</label><label><input class="day-mode" type="radio" value="data" checked>填寫</label></div><div class="day-fields"><div class="day-rows"></div><button class="btn btn-secondary add-day">＋ 新增天數</button><div class="note day-warning"></div></div>`;return `<div class="row-grid"><div><label>項目名稱</label><input data-biz="title"></div><div><label>內容</label><input data-biz="text"></div></div>`}
function addBiz(btn){const sec=btn.closest('.biz-section'),list=sec.querySelector('.biz-list'),set=btn.dataset.set,defs=set==='i'?iBiz:commonBiz;list.insertAdjacentHTML('beforeend',`<div class="business-card" data-set="${set}" data-name="" data-type=""><div class="business-title"><select class="biz-pick"><option value="">－ 請選擇項目 －</option>${Object.keys(defs).map(x=>`<option>${x}</option>`).join('')}</select><button class="remove-business">✕ 移除此業務</button></div><div class="biz-fields"></div></div>`);render()}
function pickBiz(sel){const card=sel.closest('.business-card'),list=card.closest('.biz-list'),defs=card.dataset.set==='i'?iBiz:commonBiz,name=sel.value,prev=card.dataset.name;if(name===prev)return;if(!name){card.dataset.name='';card.dataset.type='';card.querySelector('.biz-fields').innerHTML='';return}if(name!=='其他項目'&&[...list.querySelectorAll('.business-card')].some(c=>c!==card&&c.dataset.name===name)){status.textContent='此個人業務已加入，不能重複。';sel.value=prev||'';return}const type=defs[name];card.dataset.name=name;card.dataset.type=type;card.querySelector('.biz-fields').innerHTML=bizFields(type);if(type==='dayContact'){const g='day'+Date.now()+Math.random();card.querySelectorAll('.day-mode').forEach(r=>r.name=g);addDay(card)}if(type==='dateContact'){const g='dateContact'+Date.now()+Math.random();card.querySelectorAll('.date-contact-mode').forEach(r=>r.name=g);addDateContact(card)}}
function addDay(card){const rows=card.querySelector('.day-rows'),used=[...rows.querySelectorAll('[data-biz=days]')].map(x=>x.value),avail=Array.from({length:35},(_,i)=>`-${i+1}`).filter(x=>!used.includes(x));if(!avail.length){card.querySelector('.day-warning').textContent='-1 至 -35 天皆已建立。';return}rows.insertAdjacentHTML('beforeend',`<div class="row-card day-row"><button class="remove-day-row">刪除本列</button><div class="row-grid"><div><label>天數</label><select data-biz="days">${avail.map(x=>`<option>${x}</option>`).join('')}</select></div>${['已接','未接','簡訊','LINE'].map(x=>`<div><label>${x}</label><input type="number" min="0" data-biz="${x}"></div>`).join('')}</div></div>`)}
function addDateContact(card){const rows=card.querySelector('.date-contact-rows');rows.insertAdjacentHTML('beforeend',`<div class="row-card date-contact-row"><button class="remove-date-contact-row">刪除本列</button><div class="row-grid"><div><label>追蹤月</label><input type="number" min="1" max="12" data-biz="trackMonth" placeholder="1–12"></div><div><label>追蹤日</label><input type="number" min="1" max="31" data-biz="trackDay" placeholder="1–31"></div>${['已接','未接','簡訊','LINE'].map(x=>`<div><label>${x}</label><input type="number" min="0" data-biz="${x}"></div>`).join('')}</div></div>`)}
function val(root,sel){const x=root.querySelector(sel);return x?x.value.trim():''}
function dateLine(root){const x=val(root,'[data-role=date]'),d=x?new Date(x+'T00:00:00'):new Date();return `📅 日期：${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`}
function renderBiz(sec,defs){const lines=['【個人業務】'];if(sec.querySelector('input[name^=bizGlobal][value=none]:checked'))return lines.concat('無');const cards=[...sec.querySelectorAll('.business-card')].filter(c=>c.dataset.name);if(!cards.length)return lines.concat('無');cards.forEach((c,i)=>{const name=c.dataset.name,type=c.dataset.type;let text='無';if(type==='contact'){const p=['已接','未接','簡訊','LINE'].map(k=>{const x=val(c,`[data-biz="${k}"]`);return x!==''?`${k}${x}`:''}).filter(Boolean);text=p.join(' ')||'無'}else if(type==='dateShift')text=`完成至${val(c,'[data-biz=month]')}月${val(c,'[data-biz=day]')}日${val(c,'[data-biz=shift]')}診`;else if(type==='dateOnly')text=`完成至${val(c,'[data-biz=month]')}月${val(c,'[data-biz=day]')}日`;else if(type==='pulledDate')text=`撈至${val(c,'[data-biz=month]')}月${val(c,'[data-biz=day]')}日`;else if(type==='yearMonth')text=`完成至${val(c,'[data-biz=year]')}年${val(c,'[data-biz=month]')}月`;else if(type==='twoStage'){const p=[],a=val(c,'[data-biz=stage1]'),b=val(c,'[data-biz=stage2]');if(a)p.push(`一階輸入：${a}`);if(b)p.push(`二接輸入：${b}`);text=p.join('\n')||'無'}else if(type==='people')text=(val(c,'[data-biz=people]')!==''?`${val(c,'[data-biz=people]')}人`:'無');else if(type==='linePeople')text=(val(c,'[data-biz=people]')!==''?`LINE${val(c,'[data-biz=people]')}人`:'無');else if(type==='vpn'){const p=[...c.querySelectorAll('[data-biz=vpn]:checked')].map(x=>`${x.value}已完成`);text=p.join('\n')||'無'}else if(type==='dateContact'){if(c.querySelector('.date-contact-mode[value=none]:checked'))text='無';else{const dl=[],seen=new Set();[...c.querySelectorAll('.date-contact-row')].forEach(r=>{const m=val(r,'[data-biz=trackMonth]'),d=val(r,'[data-biz=trackDay]'),key=`${m}-${d}`;const p=['已接','未接','簡訊','LINE'].map(k=>{const x=val(r,`[data-biz="${k}"]`);return x!==''?`${k}${x}`:''}).filter(Boolean);if(m&&d&&p.length&&!seen.has(key)){seen.add(key);dl.push(`${m}月${d}日：${p.join(' ')}`)}});text=dl.length?'\n'+dl.join('\n'):'無'} }else if(type==='dayContact'){if(c.querySelector('.day-mode[value=none]:checked'))text='無';else{const dl=[];[...c.querySelectorAll('.day-row')].forEach(r=>{const p=['已接','未接','簡訊','LINE'].map(k=>{const x=val(r,`[data-biz="${k}"]`);return x!==''?`${k}${x}`:''}).filter(Boolean);if(p.length)dl.push(`${val(r,'[data-biz=days]')}：${p.join(' ')}`)});text=dl.length?'\n'+dl.join('\n'):'無'}}else{const title=val(c,'[data-biz=title]')||'其他項目';lines.push(`${circ[i]||i+1+'.'} ${title}：${val(c,'[data-biz=text]')||'無'}`);return}lines.push(`${circ[i]||i+1+'.'} ${name}：${text}`)});return lines}
function renderAOutput(){const lines=['【院所交班表】',dateLine(formRoot),`🏥 院所：${val(formRoot,'[data-role=clinic]')}`,''];handovers.forEach(d=>{const mode=formRoot.querySelector(`input[name=${d.id}Mode]:checked`)?.value||'none',out=[];if(mode==='data'){const box=formRoot.querySelector(`[data-handover=${d.id}]`);if(d.type==='repeat')[...box.querySelectorAll('.row-card')].forEach((r,i)=>{let t='';if(d.id==='labs')t=`${val(r,'[data-field=mrn]')} ${val(r,'[data-field=name]')}缺${val(r,'[data-field=missing]')}`;if(d.id==='records')t=`${val(r,'[data-field=mrn]')} ${val(r,'[data-field=name]')}申請${val(r,'[data-field=request]')} ${val(r,'[data-field=progress]')}`;if(d.id==='repair')t=`${val(r,'[data-field=location]')} ${val(r,'[data-field=name]')} ${val(r,'[data-field=reason]')}，當前進度：${val(r,'[data-field=progress]')}`;if(d.id==='special')t=val(r,'[data-field=text]');if(t.replace(/[，：\s]/g,''))out.push(`${circ[i]||i+1+'.'} ${t.trim()}`)});if(d.type==='select')out.push(val(box,'[data-role=single]'));if(d.type==='stockRepeat')[...box.querySelectorAll('.row-card')].forEach((r,i)=>{const item=val(r,'[data-field=item]');if(item)out.push(`${circ[i]||i+1+'.'} ${item}發放：${val(r,'[data-field=out]')||0}${val(r,'[data-field=unit]')||'支'} 餘量：${val(r,'[data-field=left]')||0}${val(r,'[data-field=unit]')||'支'}`)});if(d.type==='stock'){d.rows.forEach((r,i)=>out.push(`${circ[i]||i+1+'.'} ${r[0]}：${d.kind}${val(box,`[data-stock="${d.id}-${i}-a"]`)||0}${r[1]} ${d.kind==='庫存'?'預訂':'餘'}${val(box,`[data-stock="${d.id}-${i}-b"]`)||0}${r[1]}`));[...box.querySelectorAll('.custom-stock')].forEach((r,j)=>{const item=val(r,'[data-field=item]');if(item)out.push(`${circ[d.rows.length+j]||d.rows.length+j+1+'.'} ${item}：${d.kind}${val(r,'[data-field=a]')||0}${val(r,'[data-field=unit]')||'支'} ${d.kind==='庫存'?'預訂':'餘'}${val(r,'[data-field=b]')||0}${val(r,'[data-field=unit]')||'支'}`)})}}lines.push(`【${d.title}】：${out.length?'\n'+out.join('\n'):'無'}`)});lines.push('',...renderBiz(formRoot.querySelector('.biz-section'),commonBiz));return lines}
function renderBDOutput(){return ['【院所交班表】',dateLine(formRoot),`🏥 院所：${val(formRoot,'[data-role=clinic]')}`,'',...renderBiz(formRoot.querySelector('.biz-section'),commonBiz)]}
function renderIOutput(){const all=[];document.querySelectorAll('.clinic-card').forEach((c,i)=>{if(i)all.push('');all.push('【院所交班表】',dateLine(c),`🏥 院所：${val(c,'[data-role=clinic]')}`,'',...renderBiz(c.querySelector('.biz-section'),iBiz))});return all}
function render(){let lines=[];if(current==='A')lines=renderAOutput();else if(current==='B'||current==='D')lines=renderBDOutput();else if(current==='I')lines=renderIOutput();else if(current==='weekly'){const mode=formRoot.querySelector('input[name=weeklyMode]:checked')?.value;lines=[`🏥 院所：${val(formRoot,'[data-role=clinic]')}`,mode==='none'?'無須更新主機已重啟':`${val(formRoot,'[data-role=weeklyItem]')||'項目'}須更新`]}else if(current==='monthly'){const card=formRoot.querySelector('[data-handover=labs]'),mode=formRoot.querySelector('input[name=labsMode]:checked')?.value,out=[];if(mode==='data')[...card.querySelectorAll('.row-card')].forEach((r,i)=>{const mrn=val(r,'[data-field=mrn]'),name=val(r,'[data-field=name]'),missing=val(r,'[data-field=missing]');if(mrn||name||missing)out.push(`${circ[i]||i+1+'.'} ${mrn} ${name}缺${missing}`.trim())});const dm=formRoot.querySelector('input[name=destroyMode]:checked')?.value,dy=val(formRoot,'[data-role=destroyYear]'),dmo=val(formRoot,'[data-role=destroyMonth]');lines=[`🏥 院所：${val(formRoot,'[data-role=clinic]')}：`,`【未完成採檢】：${out.length?'\n'+out.join('\n'):'無'}`,`【抽審病歷銷毀】：${dm==='data'&&dy&&dmo?`銷毀至${dy}年${dmo}月`:'無'}`]}else lines=[`🏥 院所：${val(formRoot,'[data-role=clinic]')}`,`更新密碼：${val(formRoot,'[data-role=passwordText]')}`];preview.textContent=lines.join('\n');autoSave()}
document.addEventListener('click',e=>{const t=e.target;if(t.matches('.type-btn')){current=t.dataset.type;renderForm()}else if(t.id==='addClinic')addIClinic();else if(t.matches('.remove-clinic')){t.closest('.clinic-card').remove();renumberClinics();render()}else if(t.matches('.add-row')){addRow(t.dataset.id);render()}else if(t.matches('.add-custom')){addCustom(t.dataset.id);render()}else if(t.matches('.remove,.remove-day-row,.remove-date-contact-row')){t.closest('.row-card').remove();render()}else if(t.matches('.add-biz'))addBiz(t);else if(t.matches('.remove-business')){t.closest('.business-card').remove();render()}else if(t.matches('.add-day')){addDay(t.closest('.business-card'));render()}else if(t.matches('.add-date-contact')){addDateContact(t.closest('.business-card'));render()}})
document.addEventListener('change',e=>{if(e.target.matches('.biz-pick'))pickBiz(e.target);if(e.target.matches('input[name$=Mode]')){const id=e.target.name.replace('Mode',''),f=document.getElementById(id+'Fields');if(f){f.classList.toggle('hidden',e.target.value==='none');if(e.target.value==='data'&&f.querySelector('.rows')&&!f.querySelector('.row-card'))addRow(id)}}if(e.target.name==='weeklyMode')weeklyFields.classList.toggle('hidden',e.target.value==='none');if(e.target.name==='destroyMode')document.getElementById('destroyFields')?.classList.toggle('hidden',e.target.value==='none');if(e.target.matches('.day-mode'))e.target.closest('.business-card').querySelector('.day-fields').classList.toggle('hidden',e.target.value==='none');if(e.target.matches('.date-contact-mode'))e.target.closest('.business-card').querySelector('.date-contact-fields').classList.toggle('hidden',e.target.value==='none');if(e.target.name&&e.target.name.startsWith('bizGlobal')&&e.target.type==='radio') {const s=e.target.closest('.biz-section');s.querySelector('.biz-controls').classList.toggle('hidden',e.target.value==='none')}render()})
document.addEventListener('input',e=>{if(e.target.matches&&e.target.matches('.biz-pick'))pickBiz(e.target);render()});
async function copy(clear){try{await navigator.clipboard.writeText(preview.textContent)}catch{const a=document.createElement('textarea');a.value=preview.textContent;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove()}status.textContent='已複製，可直接貼到 LINE。';if(clear)setTimeout(renderForm,200)}
copyBtn.onclick=()=>copy(false);copyClearBtn.onclick=()=>copy(true);
let restoring=false;
clearAll.onclick=()=>{restoring=true;renderForm();restoring=false;status.textContent='已清除目前表單（上次自動保存的內容仍可用「載入草稿」還原）。'};
function syncValues(root){root.querySelectorAll('input').forEach(el=>{if(el.type==='checkbox'||el.type==='radio'){if(el.checked)el.setAttribute('checked','');else el.removeAttribute('checked')}else el.setAttribute('value',el.value)});root.querySelectorAll('textarea').forEach(el=>{el.textContent=el.value});root.querySelectorAll('select option').forEach(o=>{if(o.selected)o.setAttribute('selected','');else o.removeAttribute('selected')})}
function autoSave(){if(restoring)return;try{syncValues(formRoot);localStorage.setItem('nursingV2Draft',JSON.stringify({type:current,html:formRoot.innerHTML}))}catch(e){}}
loadDraft.onclick=()=>{const raw=localStorage.getItem('nursingV2Draft');if(!raw){status.textContent='尚無自動保存的內容。';return}try{const d=JSON.parse(raw);restoring=true;current=d.type||'A';renderTypeButtons();formRoot.innerHTML=d.html;restoring=false;render();status.textContent='已載入上次自動保存的內容。'}catch(e){restoring=false;status.textContent='載入失敗。'}};
restoring=true;renderForm();restoring=false;
</script></body></html>
